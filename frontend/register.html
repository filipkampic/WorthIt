<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorthIt - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <h1>Register</h1>

    <form id="registerForm">
        <input type="text" id="regUsername" placeholder="Username" required>

        <input type="email" id="regEmail" placeholder="Email" required>

        <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Password" required>
            <button type="button" class="toggle-password" data-target="regPassword"><i class="fa-solid fa-eye"></i></button>
        </div>

        <div id="passwordStrength"></div>

        <div class="password-wrapper">
            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
            <button type="button" class="toggle-password" data-target="regConfirmPassword"><i class="fa-solid fa-eye"></i></button>
        </div>

        <button type="submit">Register</button>
        
        <div id="registerError"></div>
    </form>

    <p>Already have an account? <a href="login.html">Log in</a></p>

    <script src="scripts/api.js"></script>
    <script src="scripts/register.js"></script>
</body>
</html>
